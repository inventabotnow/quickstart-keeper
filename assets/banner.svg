<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320" role="img" aria-label="quickstart-keeper">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="0.55" stop-color="#161b3d"/>
      <stop offset="1" stop-color="#2a1a4a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8A2BE2"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1280" height="320" rx="20" fill="url(#bg)"/>
  <rect x="6" y="6" width="1268" height="308" rx="16" fill="none" stroke="url(#accent)" stroke-opacity="0.35" stroke-width="2"/>

  <!-- rocket glyph -->
  <g transform="translate(120 160)" filter="url(#soft)">
    <circle r="74" fill="url(#accent)" opacity="0.12"/>
    <text x="0" y="26" font-size="84" text-anchor="middle" font-family="Segoe UI Emoji, Apple Color Emoji, sans-serif">🚀</text>
  </g>

  <!-- wordmark -->
  <text x="250" y="150" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="72" font-weight="700" fill="#ffffff">quickstart<tspan fill="url(#accent)">-keeper</tspan></text>

  <!-- tagline -->
  <text x="252" y="200" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="27" fill="#c9d1d9">Transportable project memory for Claude Code — it ships with your repo.</text>

  <!-- chips -->
  <g font-family="ui-monospace, Menlo, Consolas, monospace" font-size="20" fill="#0d1117">
    <g transform="translate(252 238)">
      <rect width="190" height="40" rx="20" fill="#8A2BE2"/>
      <text x="95" y="26" text-anchor="middle" fill="#ffffff">reads first</text>
    </g>
    <g transform="translate(456 238)">
      <rect width="220" height="40" rx="20" fill="#22d3ee"/>
      <text x="110" y="26" text-anchor="middle" fill="#06222a">self-updating</text>
    </g>
    <g transform="translate(690 238)">
      <rect width="210" height="40" rx="20" fill="#3fb950"/>
      <text x="105" y="26" text-anchor="middle" fill="#06220c">token-light</text>
    </g>
    <g transform="translate(914 238)">
      <rect width="250" height="40" rx="20" fill="none" stroke="url(#accent)" stroke-width="2"/>
      <text x="125" y="26" text-anchor="middle" fill="#c9d1d9">/quickstart command</text>
    </g>
  </g>
</svg>
